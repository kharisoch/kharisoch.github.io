<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhariSoch - Admin & Business Hub</title>
<style>
:root{--bg:#050510;--neon:#00f7ff;--pink:#ff00d4;--txt:#fff;--muted:#aaa;--gold:#ffd700}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#111,#050510 60%);color:var(--txt)}
header{padding:25px;text-align:center;border-bottom:1px solid #1b1b3a;position:sticky;top:0;background:rgba(5,5,16,.8);backdrop-filter:blur(8px);z-index:100}
.logo{font-size:38px;font-weight:800;color:var(--neon);text-shadow:0 0 12px var(--neon)}
.wrap{max-width:900px;margin:auto;padding:15px}
.card{background:#0b0b1f;border:1px solid #1f1f40;border-radius:15px;padding:20px;margin-bottom:20px;box-shadow:0 0 15px rgba(0,247,255,0.1)}
.admin-box{background:#161635;border:2px solid var(--pink);padding:15px;border-radius:12px;margin:15px 0}
.biz-box{background:#1a1a00;border:2px solid var(--gold);padding:15px;border-radius:12px;margin:15px 0}
input,textarea{width:100%;padding:12px;margin:8px 0;background:#000;color:#fff;border:1px solid #333;border-radius:8px}
button{padding:12px;border:none;border-radius:8px;cursor:pointer;font-weight:700;margin:5px 0;width:100%}
.btn-neon{background:var(--neon);color:#000}.btn-gold{background:var(--gold);color:#000}.btn-red{background:#ff4d4d}
.hidden{display:none}.ad-space{background:#111;border:1px dashed #444;padding:20px;text-align:center;color:var(--muted);margin:15px 0}
.quote-card{border-left:4px solid var(--neon);background:#0d0d2b;padding:15px;margin-bottom:15px;border-radius:0 10px 10px 0}
</style>
</head>
<body>

<header><div class='logo'>KhariSoch</div></header>

<div class='wrap'>
    <!-- Google Ads Space -->
    <div class="ad-space">Future Google Ads / Promotion Banner</div>

    <div class='card' id="auth-section">
        <h3>🔐 Admin Login</h3>
        <input type='password' id='mainPassInput' placeholder='Enter Admin Password'>
        <button class='btn-neon' onclick='login()'>Open Panel</button>
    </div>

    <!-- THOUGHT ADMIN PANEL -->
    <div id='thoughtPanel' class='hidden admin-box'>
        <h3 style="color:var(--neon)">📝 Post New Thought</h3>
        <textarea id='tContent' rows='4' placeholder='Aaj ki khari baat...'></textarea>
        <input id='tLink' placeholder='Promotion Link (Optional)'>
        <button class='btn-neon' onclick='saveThought()'>Publish Now</button>
        
        <hr style="border:0.5px solid #333; margin:20px 0">
        
        <input type='password' id='masterPassInput' placeholder='Enter Master Password for Bank/Settings'>
        <button class='btn-gold' onclick='openMaster()'>Open Business & Security</button>
        <button class='btn-red' onclick="logout()">Logout</button>
    </div>

    <!-- MASTER BUSINESS PANEL -->
    <div id='masterPanel' class='hidden biz-box'>
        <h3 style="color:var(--gold)">💰 Business & Bank Manager</h3>
        <textarea id='bankData' rows='3' placeholder='Bank A/c, IFSC, Branch Details...'></textarea>
        <input id='upiData' placeholder='UPI ID (e.g. name@okicici)'>
        <button class='btn-gold' onclick='saveBiz()'>Save Business Details</button>
        
        <h3 style="color:var(--pink); margin-top:20px">⚙️ Change Passwords</h3>
        <input type='password' id='newAdminPass' placeholder='New Admin Password'>
        <input type='password' id='newMasterPass' placeholder='New Master Password'>
        <button class='btn-neon' onclick='changePasswords()'>Update Passwords</button>
    </div>

    <div id='list'>Loading thoughts...</div>
</div>

<!-- Firebase -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
// REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDGg1Vjg2kNVfuosdumF5fmAl-mP-GAk4I",
  authDomain: "kharisoch-ae2c8.firebaseapp.com",
  databaseURL: "https://kharisoch-ae2c8-default-rtdb.firebaseio.com",
  projectId: "kharisoch-ae2c8",
  storageBucket: "kharisoch-ae2c8.firebasestorage.app",
  messagingSenderId: "657836217172",
  appId: "1:657836217172:web:8e25c94934562034f92ec1",
  measurementId: "G-D4X58WZL9
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Initial Passwords (Pehli baar ke liye)
let ADMIN_P = "Happy@123";
let MASTER_P = "Master@786";

// Load Settings from DB
db.ref('settings').on('value', (s) => {
    const d = s.val();
    if(d) { ADMIN_P = d.adminP; MASTER_P = d.masterP; }
});

function login() {
    if(document.getElementById('mainPassInput').value === ADMIN_P) {
        document.getElementById('thoughtPanel').classList.remove('hidden');
        document.getElementById('auth-section').classList.add('hidden');
    } else { alert("Wrong Admin Password!"); }
}

function openMaster() {
    if(document.getElementById('masterPassInput').value === MASTER_P) {
        document.getElementById('masterPanel').classList.toggle('hidden');
    } else { alert("Wrong Master Password!"); }
}

function saveThought() {
    const content = document.getElementById('tContent').value;
    const link = document.getElementById('tLink').value;
    if(!content) return alert("Write something!");
    db.ref('thoughts').push({ content, link, date: new Date().toLocaleString() });
    document.getElementById('tContent').value = ''; document.getElementById('tLink').value = '';
    alert("Thought Live!");
}

function saveBiz() {
    const bank = document.getElementById('bankData').value;
    const upi = document.getElementById('upiData').value;
    db.ref('business').set({ bank, upi });
    alert("Business Details Updated!");
}

function changePasswords() {
    const a = document.getElementById('newAdminPass').value;
    const m = document.getElementById('newMasterPass').value;
    if(a && m) {
        db.ref('settings').set({ adminP: a, masterP: m });
        alert("Passwords Changed! Refreshing...");
        location.reload();
    } else { alert("Enter both new passwords!"); }
}

function logout() { location.reload(); }

// Render Thoughts
db.ref('thoughts').on('value', (snap) => {
    const data = snap.val();
    const list = document.getElementById('list');
    list.innerHTML = '<h2>Latest Thoughts</h2>';
    if(!data) return;
    Object.keys(data).reverse().forEach(id => {
        const x = data[id];
        list.innerHTML += `
            <div class='quote-card'>
                <p style="font-size:18px">${x.content}</p>
                ${x.link ? `<a href="${x.link}" target="_blank" style="color:var(--pink)">Check Promotion 🔗</a>` : ''}
                <div style="font-size:11px; color:#555; margin-top:10px">${x.date}</div>
                <button class='btn-neon' style="width:auto; padding:5px 15px; margin-top:10px" onclick="share('${x.content.replace(/\n/g,' ')}')">Share</button>
            </div>`;
    });
});

function share(t) {
    navigator.clipboard.writeText(t + " - Read more on KhariSoch");
    alert("Copied! Share it on WhatsApp.");
}
</script>
</body>
</html>
